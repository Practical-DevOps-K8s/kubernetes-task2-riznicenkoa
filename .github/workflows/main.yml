name: Docker Task

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
  
    runs-on: ubuntu-latest

    steps:
    - name: Generate a token
      id: generate-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
    - uses: actions/checkout@v6
    - name: Create k8s Kind Cluster
      uses: helm/kind-action@v1
    - name: Build Docker Image
      run: docker build -t webapp:latest .

    - name: Load Image into Kind
      run: kind load docker-image webapp:latest --name chart-testing
    - name: Create secret from GitHub Secrets
      run: |
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: postgres-secret
        type: Opaque
        stringData:
          postgres-password: ${{ secrets.POSTGRES_PASSWORD }}
          secret-key-base: ${{ secrets.SECRET_KEY_BASE }}
        EOF
    - name: Build and start containers for a services
      run: |
        kubectl apply -R -f ./k8s
        # Даем подам 30 секунд просто прийти в себя
        sleep 30

    
    - name: Debug Kubernetes Status
      if: always()
      run: |
        echo "=== СМОТРИМ ВСЕ РЕСУРСЫ В КЛАСТЕРЕ ==="
        kubectl get all
        echo "=== ЛОГИ ВЕБ-ПРИЛОЖЕНИЯ ==="
        kubectl logs deployment/webapp --tail=50 || echo "Контейнер еще не запустился"
    - name: Run Port Forward and Cypress Tests
      env:
        CYPRESS_BASE_URL: http://localhost:8080
      run: |
        # Запускаем проброс портов
        kubectl port-forward service/webapp-service 8080:80 --address 0.0.0.0 &
        
        # Переходим к тестам
        cd ./.github/tests
        npm install
        
        # Ждем открытия порта
        npx wait-on http://localhost:8080 --timeout 60000
        
        # Запуск тестов
        npx cypress run

    - name: Final Step
      env:
        GH_TOKEN: ${{ steps.generate-token.outputs.token }}
      run: |
        gh repo edit $GITHUB_REPOSITORY --visibility private --accept-visibility-change-consequences
