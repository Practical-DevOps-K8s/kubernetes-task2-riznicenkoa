name: Docker Task

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Generate a token
      id: generate-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
    - uses: actions/checkout@v6
    - name: Create k8s Kind Cluster
      uses: helm/kind-action@v1
    - name: Build Docker Image
      run: docker build -t webapp:v10 .

    - name: Load Image into Kind
      run: kind load docker-image webapp:v10 --name chart-testing

    - name: Create secret from GitHub Secrets
      run: |
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: postgres-secret
        type: Opaque
        stringData:
          postgres-password: ${{ secrets.POSTGRES_PASSWORD }}
          secret-key-base: ${{ secrets.SECRET_KEY_BASE }}
        EOF
    - name: Build and start containers for a services
      run: |
        kubectl apply -R -f ./k8s
        sleep 50

    - name: Debug Kubernetes Status
      if: always()
      run: |
        kubectl get all
        kubectl logs deployment/webapp --tail=50
    - name: Run Port Forward and Cypress Tests
      env:
        CYPRESS_BASE_URL: http://localhost:8080
      run: |
        kubectl port-forward deployment/webapp 8080:3000 --address 0.0.0.0 &
        
        cd ./.github/tests
        npm install
        npx wait-on http://localhost:8080 --timeout 60000
        npx cypress run
    - name: Post-Test Rails Error Debug
      if: always()
      run: |
        kubectl logs deployment/webapp --tail=100
    - name: Final Step
      env:
        GH_TOKEN: ${{ steps.generate-token.outputs.token }}
      run: |
        gh repo edit $GITHUB_REPOSITORY --visibility private --accept-visibility-change-consequences
