name: Docker Task

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
  
    runs-on: ubuntu-latest

    steps:
    - name: Generate a token
      id: generate-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
    - uses: actions/checkout@v6
    - name: Create k8s Kind Cluster
      uses: helm/kind-action@v1
    - name: Build Docker Image
      run: docker build -t webapp:latest .

    - name: Load Image into Kind
      run: kind load docker-image webapp:latest --name chart-testing
    - name: Create secret from GitHub Secrets
      run: |
        PLAIN_PASSWORD=$(echo "${{ secrets.POSTGRES_PASSWORD }}" | base64 --decode)
        PLAIN_KEY=$(echo "${{ secrets.SECRET_KEY_BASE }}" | base64 --decode)

        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: postgres-secret
        type: Opaque
        stringData:
          postgres-password: ${PLAIN_PASSWORD}
          secret-key-base: ${PLAIN_KEY}
        EOF
    - name: Build and start containers for a services
      run: |
        kubectl apply -R -f ./k8s
        kubectl wait pods --all --for condition=Ready --timeout=90s
    - name: Check pod status and logs if crash
      if: always()
      run: |
        kubectl get pods
        kubectl get service webapp-service
        kubectl logs deployment/webapp --tail=50
    - name: Port Forward to webservice
      run: |
        kubectl port-forward service/webapp-service 8080:80 --address 0.0.0.0 &
        sleep 20

    - name: Test containers functionality
      uses: cypress-io/github-action@v6
      env:
        CYPRESS_BASE_URL: http://localhost:8080
      with:
        working-directory: ./.github/tests

    - name: Final Step
      env:
        GH_TOKEN: ${{ steps.generate-token.outputs.token }}
      run: |
        gh repo edit $GITHUB_REPOSITORY --visibility private --accept-visibility-change-consequences
