name: Docker Task

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Generate a token
      id: generate-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
    - uses: actions/checkout@v6
    - name: Create k8s Kind Cluster
      uses: helm/kind-action@v1
    - name: Build Docker Image
      run: docker build -t webapp:v10 .

    - name: Load Image into Kind
      run: kind load docker-image webapp:v10 --name chart-testing

    - name: Create secret from GitHub Secrets
      run: |
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: postgres-secret
        type: Opaque
        stringData:
          postgres-password: ${{ secrets.POSTGRES_PASSWORD }}
          secret-key-base: ${{ secrets.SECRET_KEY_BASE }}
        EOF
    - name: Build and start containers for a services
      run: |
        kubectl apply -R -f ./k8s
        echo
        sleep 30
    - name: Run Application Component Tests
      run: |
        kubectl run test-connection --rm -i --restart=Never --image=curlimages/curl -- http://webapp-service:80

    - name: Verify Final Kubernetes Status
      run: |
        echo
        kubectl get pods
        kubectl get services
        kubectl get deployments
